# How the hell does secret scanning work? Read this:
#   https://lookingatcomputer.substack.com/p/regex-is-almost-all-you-need
#
# This is the default betterleaks configuration file.
# Rules and filters are defined within this file.
# Rules instruct betterleaks on what should be considered a secret.
# Filters instruct betterleaks on what to skip (prefilter) or discard (filter).

title = "betterleaks config"

# minVersion indicates the minimum gitleaks config format version required.
# betterleaksMinVersion indicates the minimum betterleaks version required.
# If the running version is older, a warning will be logged.
minVersion = "v8.25.0"
betterleaksMinVersion = "v1.3.0"


prefilter = '''
matchesAny(attributes[?"path"].orValue(""), [
  r"""gitleaks\.toml""",
  r"""(?:^|/)\.betterleaks\.toml$""",
  r"""(?:^|/)\.terraform(?:/.*)?$""",
  r"""(?i)\.(?:example|sample|dist|template|tpl)$""",
  r"""(?i)\.(?:bmp|gif|jpe?g|png|svg|tiff?)$""",
  r"""(?i)\.(?:eot|[ot]tf|woff2?)$""",
  r"""(?i)\.(?:docx?|xlsx?|pdf|bin|socket|vsidx|v2|suo|wsuo|dll|pdb|exe|gltf)$""",
  r"""go\.(?:mod|sum|work(?:\.sum)?)$""",
  r"""(?:^|/)vendor/modules\.txt$""",
  r"""(?:^|/)vendor/(?:github\.com|golang\.org/x|google\.golang\.org|gopkg\.in|istio\.io|k8s\.io|sigs\.k8s\.io)(?:/.*)?$""",
  r"""(?:^|/)gradlew(?:\.bat)?$""",
  r"""(?:^|/)gradle\.lockfile$""",
  r"""(?:^|/)mvnw(?:\.cmd)?$""",
  r"""(?:^|/)\.mvn/wrapper/MavenWrapperDownloader\.java$""",
  r"""(?:^|/)node_modules(?:/.*)?$""",
  r"""(?:^|/)(?:deno\.lock|npm-shrinkwrap\.json|package-lock\.json|pnpm-lock\.yaml|yarn\.lock)$""",
  r"""(?:^|/)bower_components(?:/.*)?$""",
  r"""(?:^|/)(?:angular|bootstrap|jquery(?:-?ui)?|plotly|swagger-?ui)[a-zA-Z0-9.-]*(?:\.min)?\.js(?:\.map)?$""",
  r"""(?:^|/)javascript\.json$""",
  r"""(?:^|/)(?:Pipfile|poetry)\.lock$""",
  r"""(?i)(?:^|/)(?:v?env|virtualenv)/lib(?:64)?(?:/.*)?$""",
  r"""(?i)(?:^|/)(?:lib(?:64)?/python[23](?:\.\d{1,2})+|python/[23](?:\.\d{1,2})+/lib(?:64)?)(?:/.*)?$""",
  r"""(?i)(?:^|/)[a-z0-9_.]+-[0-9.]+\.dist-info(?:/.+)?$""",
  r"""(?:^|/)vendor/(?:bundle|ruby)(?:/.*?)?$""",
  r"""\.gem$""",
  r"""verification-metadata\.xml""",
  r"""Database.refactorlog""",
  r"""(?:^|/)\.git$"""
])

'''

filter = '''
(matchesAny(finding["secret"], [
  r"""(?i)^true|false|null$""",
  r"""^(?i:a+|b+|c+|d+|e+|f+|g+|h+|i+|j+|k+|l+|m+|n+|o+|p+|q+|r+|s+|t+|u+|v+|w+|x+|y+|z+|\*+|\.+)$""",
  r"""^\$(?:\d+|{\d+})$""",
  r"""^\$(?:[A-Z_]+|[a-z_]+)$""",
  r"""^\${(?:[A-Z_]+|[a-z_]+)}$""",
  r"""^\{\{[ \t]*[\w ().|]+[ \t]*}}$""",
  r"""^\$\{\{[ \t]*(?:(?:env|github|secrets|vars)(?:\.[A-Za-z]\w+)+[\w "'&./=|]*)[ \t]*}}$""",
  r"""^%(?:[A-Z_]+|[a-z_]+)%$""",
  r"""^%[+\-# 0]?[bcdeEfFgGoOpqstTUvxX]$""",
  r"""^\{\d{0,2}}$""",
  r"""^@(?:[A-Z_]+|[a-z_]+)@$""",
  r"""^/Users/(?i)[a-z0-9]+/[\w .-/]+$""",
  r"""^/(?:bin|etc|home|opt|tmp|usr|var)/[\w ./-]+$""",
  r"""^ENC\[AES256""",
  r"""^ssh-(?:rsa|ed25519|dss|dsa)\b""",
  r"""^[A-Za-z]+$""",
  r"""^[A-Za-z]+(?:[-_][A-Za-z]+)+$""",
  r"""^(?:data|var|local|module|path|each|self)\.""",
  r"""^(?:os\.environ|env)/""",
  r"""^[~.]{0,2}/[\w./-]+$"""
]) || containsAny(finding["secret"], [
  "abcdefghijklmnopqrstuvwxyz",
  "014df517-39d1-4453-b7b3-9930c563627c",
  "sha256:",
  "XXXX"
]))

'''

# ──────────────────────────────────────────────────────────────────────────────
# 1password-secret-key
# ──────────────────────────────────────────────────────────────────────────────
# ──────────────────────────────────────────────────────────────────────────────
# homelab-proxmox-api-token  (custom — no upstream)
# Formato: user@realm!tokenid=UUID  (ej. terraform@pve!provider=<uuid>)
# Sin keywords a propósito: así corre siempre y captura cualquier realm.
# ──────────────────────────────────────────────────────────────────────────────
[[rules]]
id = "homelab-proxmox-api-token"
description = "Homelab: token de API de Proxmox VE (user@realm!tokenid=uuid)."
regex = '''(?i)\b[a-z0-9._-]+@[a-z0-9._-]+![a-z0-9._-]+=([0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12})\b'''

# ──────────────────────────────────────────────────────────────────────────────
# homelab-generic-credential  (custom — reemplaza al generic-api-key nativo)
# Catch-all único de credenciales. Cubre lo que cubría generic-api-key MÁS sus
# huecos: claves guardadas como *_USERNAME, passwords de baja entropía y hashes
# bcrypt ($2a$...). Tolera falsos positivos (gate de entropía bajo).
# Los tokens Proxmox (user@realm!id=uuid) se delegan a homelab-proxmox-api-token.
# ──────────────────────────────────────────────────────────────────────────────
[[rules]]
id = "homelab-generic-credential"
description = "Homelab: catch-all de credenciales (access/api/key/password/token/secret/creds/user); FP tolerados."
regex = '''(?i)(?:password|passwd|pwd|secret|token|credentials?|creds|username|user|auth\w*|access[_.-]?key|api[_.-]?key|api[_.-]?token|key)["']?[ \t]*[:=][ \t]*["']?([^\s"'#,\x60()]{6,200})'''
keywords = ["pass", "pwd", "secret", "token", "cred", "user", "auth", "key"]
filter = '''
entropy(finding["secret"]) <= 2.0
|| matchesAny(finding["secret"], [
  r"""^https?://""",
  r"""@[a-z0-9._-]+![a-z0-9._-]+="""
])
'''

# ──────────────────────────────────────────────────────────────────────────────
# 1password-secret-key
# ──────────────────────────────────────────────────────────────────────────────
[[rules]]
id = "1password-secret-key"
description = "Uncovered a possible 1Password secret key, potentially compromising access to secrets in vaults."
regex = '''\bA3-[A-Z0-9]{6}-(?:(?:[A-Z0-9]{11})|(?:[A-Z0-9]{6}-[A-Z0-9]{5}))-[A-Z0-9]{5}-[A-Z0-9]{5}-[A-Z0-9]{5}\b'''
keywords = ["a3-"]
filter = '''
entropy(finding["secret"]) <= 3.8
'''

# ──────────────────────────────────────────────────────────────────────────────
# 1password-service-account-token
# ──────────────────────────────────────────────────────────────────────────────
[[rules]]
id = "1password-service-account-token"
description = "Uncovered a possible 1Password service account token, potentially compromising access to secrets in vaults."
regex = '''ops_eyJ[a-zA-Z0-9+/]{250,}={0,3}'''
keywords = ["ops_eyj"]
validate = '''
cel.bind(r,
  http.get("https://events.1password.com/api/v2/auth/introspect", {
    "Accept": "application/json",
    "Authorization": "Bearer " + finding["secret"]
  }),
  r.status == 200 && r.body.contains("\"features\"") ? {
    "result": "valid"
  } : r.status in [401, 403] ? {
    "result": "invalid",
    "reason": "Unauthorized"
  } : validate.unknown(r)
)
'''
filter = '''
entropy(finding["secret"]) <= 2.0
'''

# ──────────────────────────────────────────────────────────────────────────────
# adafruit-api-key
# ──────────────────────────────────────────────────────────────────────────────
[[rules]]
id = "adafruit-api-key"
description = "Identified a potential Adafruit API Key, which could lead to unauthorized access to Adafruit services and sensitive data exposure."
regex = '''(?i)[\w.-]{0,50}?(?:adafruit)(?:[ \t\w.-]{0,20})[\s'"]{0,3}(?:=|>|:{1,3}=|\|\||:|=>|\?=|,)[\x60'"\s=]{0,5}([a-z0-9_-]{32})(?:\\?['"\x60]|[\s;]|\\[nr]|$)'''
keywords = ["adafruit"]

# ──────────────────────────────────────────────────────────────────────────────
# adobe-client-id
# ──────────────────────────────────────────────────────────────────────────────
[[rules]]
id = "adobe-client-id"
