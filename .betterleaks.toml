regex = '''(?i)[\w.-]{0,50}?(?:adobe)(?:[ \t\w.-]{0,20})[\s'"]{0,3}(?:=|>|:{1,3}=|\|\||:|=>|\?=|,)[\x60'"\s=]{0,5}([a-f0-9]{32})(?:\\?['"\x60]|[\s;]|\\[nr]|$)'''
keywords = ["adobe"]
filter = '''
entropy(finding["secret"]) <= 2.0
'''

# ──────────────────────────────────────────────────────────────────────────────
# adobe-client-secret
# ──────────────────────────────────────────────────────────────────────────────
[[rules]]
id = "adobe-client-secret"
description = "Discovered a potential Adobe Client Secret, which, if exposed, could allow unauthorized Adobe service access and data manipulation."
regex = '''\b(p8e-(?i)[a-z0-9]{32})(?:\\?['"\x60]|[\s;]|\\[nr]|$)'''
keywords = ["p8e-"]
filter = '''
entropy(finding["secret"]) <= 2.0
'''

# ──────────────────────────────────────────────────────────────────────────────
# age-secret-key
# ──────────────────────────────────────────────────────────────────────────────
[[rules]]
id = "age-secret-key"
description = "Discovered a potential Age encryption tool secret key, risking data decryption and unauthorized access to sensitive information."
regex = '''AGE-SECRET-KEY-1[QPZRY9X8GF2TVDW0S3JN54KHCE6MUA7L]{58}'''
keywords = ["age-secret-key-1"]

# ──────────────────────────────────────────────────────────────────────────────
# aikido-ci-token
# ──────────────────────────────────────────────────────────────────────────────
[[rules]]
id = "aikido-ci-token"
description = "Detected an Aikido CI token, which may allow unauthorized CI scan integration activity in Aikido."
regex = '''\b(AIK_CI_[A-Za-z0-9]{20,44})\b'''
keywords = ["aik_ci_"]
validate = '''
cel.bind(r,
  http.post("https://app.aikido.dev/api/integrations/ci/scan/start", {
    "X-AIK-API-SECRET": finding["secret"],
    "Content-Type": "application/json"
  }, "{}"),
  r.status in [200, 400, 403] && !r.body.contains("\"Unauthorized\"") ? {
    "result": "valid"
  } : r.status in [401, 403] || r.body.contains("\"Unauthorized\"") ? {
    "result": "invalid",
    "reason": "Unauthorized"
  } : validate.unknown(r)
)
'''
filter = '''
filter.entropy(finding["secret"]) < 3.0
'''

# ──────────────────────────────────────────────────────────────────────────────
# aikido-client-id
# ──────────────────────────────────────────────────────────────────────────────
[[rules]]
id = "aikido-client-id"
description = "Detected an Aikido client ID, used as a component of the aikido-client-secret composite rule."
regex = '''\b(AIK_CLIENT_[A-Za-z0-9]{24})(?:\\?['"\x60]|[\s;]|\\[nr]|$)'''
keywords = ["aik_client_"]
skipReport = true
filter = '''
filter.entropy(finding["secret"]) < 3.0
'''

# ──────────────────────────────────────────────────────────────────────────────
# aikido-client-secret
# ──────────────────────────────────────────────────────────────────────────────
[[rules]]
id = "aikido-client-secret"
description = "Detected an Aikido client secret, which may allow unauthorized access to Aikido APIs when paired with a client ID."
regex = '''\b(AIK_SECRET_[A-Za-z0-9]{64})(?:\\?['"\x60]|[\s;]|\\[nr]|$)'''
keywords = ["aik_secret_"]
validate = '''
cel.bind(r,
  http.post("https://app.aikido.dev/api/oauth/token", {
    "Accept": "application/json",
    "Content-Type": "application/x-www-form-urlencoded",
    "Authorization": "Basic " + base64.encode(bytes(captures["aikido-client-id"] + ":" + finding["secret"]))
  }, "grant_type=client_credentials"),
  r.status == 200 && r.body.contains("\"access_token\"") && r.body.contains("\"token_type\"") ? {
    "result": "valid"
  } : r.status in [401, 403] ? {
    "result": "invalid",
    "reason": "Unauthorized"
  } : validate.unknown(r)
)
'''
filter = '''
filter.entropy(finding["secret"]) < 3.5
'''
[[rules.required]]
id = "aikido-client-id"

