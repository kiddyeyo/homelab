# Traefik - reverse proxy for the stack
# Uses Cloudflare DNS challenge for TLS certificates
services:
  traefik:
    image: traefik:v3
    container_name: traefik
    restart: unless-stopped
    secrets:
      # Cloudflare token used for automatic certificates
      - cf-token
    env_file:
      - .env
    environment:
      CF_DNS_API_TOKEN_FILE: /run/secrets/cf-token
      TRAEFIK_DASHBOARD_CREDENTIALS: ${TRAEFIK_DASHBOARD_CREDENTIALS}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./config/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./dynamic:/etc/traefik/dynamic:ro
      - ./config/acme.json:/etc/traefik/acme.json
    networks:
      - proxy
    labels:
      traefik.enable: true
      traefik.http.routers.traefik.rule: Host(`${DOMAIN}`)
      traefik.http.routers.traefik.entrypoints: websecure
      traefik.http.routers.traefik.service: api@internal
      traefik.http.routers.traefik.middlewares: secure-headers@file,dashboard-auth
      traefik.http.middlewares.dashboard-auth.basicauth.users: ${TRAEFIK_DASHBOARD_CREDENTIALS}
      dev.dozzle.group: "Infraestructura"

  dozzle-agent:
    image: amir20/dozzle:latest
    container_name: dozzle_agent_tfk
    command: agent
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    ports:
      - 7007:7007
    environment:
      DOZZLE_HOSTNAME: traefik
    labels:
      - "dev.dozzle.group=Infraestructura"


networks:
  proxy:
    external: true

secrets:
  cf-token:
    file: ./config/cf-token
    