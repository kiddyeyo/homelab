services:
  rustfs:
    security_opt:
      - "no-new-privileges:true"
    image: rustfs/rustfs:latest
    container_name: rustfs
    restart: unless-stopped
    ports:
      - "9000:9000" # S3 API (Terraform backend, clientes S3)
      - "9001:9001" # Web console (Traefik la expone como edge reverse proxy)
    environment:
      - RUSTFS_ADDRESS=0.0.0.0:9000
      - RUSTFS_CONSOLE_ADDRESS=0.0.0.0:9001
      - RUSTFS_CONSOLE_ENABLE=true
      - RUSTFS_CONSOLE_CORS_ALLOWED_ORIGINS=${RUSTFS_CONSOLE_CORS_ALLOWED_ORIGINS}
      - RUSTFS_ACCESS_KEY=${RUSTFS_ACCESS_KEY}
      - RUSTFS_SECRET_KEY=${RUSTFS_SECRET_KEY}
      - RUSTFS_OBS_LOGGER_LEVEL=info
      - RUSTFS_OBS_LOG_DIRECTORY=/logs
    volumes:
      - ./data:/data
      - ./logs:/logs
      # Certificados autofirmados para API + consola. Debe contener:
      # rustfs_cert.pem, rustfs_key.pem
      # El contenedor corre como UID/GID 10001:10001 (no-root).
      # ./data, ./logs y ./certs deben existir y ser propiedad de 10001:10001
      # antes del primer arranque: mkdir -p data logs certs && chown -R 10001:10001 data logs certs
    healthcheck:
      # HTTP si RUSTFS_TLS_PATH no está seteado, HTTPS si lo está (loopback usa -k por defecto).
      test:
        - CMD-SHELL
        - |
          host="$${RUSTFS_HEALTHCHECK_HOST:-127.0.0.1}"
          scheme="http"
          set -- -fsS
          if [ -n "$${RUSTFS_TLS_PATH:-}" ]; then
            scheme="https"
            ca_path="$${RUSTFS_HEALTHCHECK_CA:-}"
            if [ -z "$${ca_path}" ] && [ -f /opt/tls/ca.crt ]; then
              ca_path=/opt/tls/ca.crt
            fi
            case "$${host}" in
              127.0.0.1|localhost) strict_host=false ;;
              *) strict_host=true ;;
            esac
            if [ "$${strict_host}" = true ] && [ -n "$${ca_path}" ]; then
              set -- "$${@}" --cacert "$${ca_path}" \
                --resolve "$${host}:9000:127.0.0.1" \
                --resolve "$${host}:9001:127.0.0.1"
            else
              set -- "$${@}" -k
            fi
          fi
          curl "$${@}" "$${scheme}://$${host}:9000/health" && \
            curl "$${@}" "$${scheme}://$${host}:9001/rustfs/console/health"
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
