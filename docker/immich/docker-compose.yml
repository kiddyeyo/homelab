services:
  immich-server:
    container_name: immich_server
    image: ghcr.io/immich-app/immich-server:release
    environment:
      - TZ=America/Hermosillo
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_USERNAME=${DB_USERNAME}
      - DB_DATABASE_NAME=immich
    volumes:
      # Do not edit the next line. If you want to change the media storage location
      # on your system, edit the value of UPLOAD_LOCATION in the .env file
      - ./data:/data
      - /etc/localtime:/etc/localtime:ro
    ports:
      - "2283:2283"
    depends_on:
      - redis
      - database
    restart: always
    healthcheck:
      disable: false

  immich-machine-learning:
    container_name: immich_machine_learning
    # For hardware acceleration, add one of -[armnn, cuda, rocm, openvino, rknn] to the image tag.
    # Example tag: ${IMMICH_VERSION:-release}-cuda
    image: ghcr.io/immich-app/immich-machine-learning:release
    volumes:
      - model-cache:/cache
    environment:
      - TZ=America/Hermosillo
    restart: always
    healthcheck:
      disable: false

  redis:
    container_name: immich_redis
    image: valkey/valkey:latest
    environment:
      - TZ=America/Hermosillo
    healthcheck:
      test: redis-cli ping || exit 1
    restart: always

  database:
    container_name: immich_postgres
    image: ghcr.io/immich-app/postgres:18-vectorchord0.5.3-pgvector0.8.1
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_DB: immich
      POSTGRES_INITDB_ARGS: "--data-checksums"
      TZ: America/Hermosillo
    volumes:
      - ./postgres:/var/lib/postgresql
    shm_size: 128mb
    restart: always
    healthcheck:
      disable: false

  dozzle-agent:
    image: amir20/dozzle:latest
    container_name: dozzle_agent_imm
    restart: unless-stopped
    command: agent
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    ports:
      - 7007:7007
    environment:
      DOZZLE_HOSTNAME: immich

volumes:
  model-cache:
