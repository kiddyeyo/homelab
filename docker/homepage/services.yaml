- Infrastructure:
    - Proxmox Virtual Environment:
        icon: proxmox
        href: https://pve.infra.sintaq.net:8006
        description: Virtualization Cluster
        siteMonitor: https://pve.infra.sintaq.net:8006
        widget:
          type: proxmox
          url: https://pve.infra.sintaq.net:8006
          username: "{{HOMEPAGE_VAR_PVE_USERNAME}}"
          password: "{{HOMEPAGE_VAR_PVE_PASSWORD}}"
          node: pve

    - Proxmox Backup Server:
        icon: proxmox
        href: https://pbs.infra.sintaq.net:8007
        description: Proxmox Backup Server
        siteMonitor: https://pbs.infra.sintaq.net:8007
        widget:
          type: proxmoxbackupserver
          url: https://pbs.infra.sintaq.net:8007
          username: "{{HOMEPAGE_VAR_PBS_USERNAME}}"
          password: "{{HOMEPAGE_VAR_PBS_PASSWORD}}"
          datastore: local-zfs

    - RustFS:
        icon: rustfs
        href: https://rustfs.infra.sintaq.net
        description: S3-Compatible Object Storage
        siteMonitor: https://rustfs.infra.sintaq.net
        proxmoxNode: pve
        proxmoxVMID: 200

- Network Services:
    - Unifi:
        icon: unifi
        href: https://unifi.infra.sintaq.net
        description: Gateway & Firewall
        siteMonitor: https://unifi.infra.sintaq.net
        widget:
          type: unifi
          url: https://unifi.infra.sintaq.net
          key: "{{HOMEPAGE_VAR_UNIFI_KEY}}"

    - Technitium DNS1:
        icon: technitium
        href: https://dns1.infra.sintaq.net:53443
        description: DNS Server
        siteMonitor: https://dns1.infra.sintaq.net:53443
        widget:
          type: technitium
          url: https://dns1.infra.sintaq.net:53443
          key: "{{HOMEPAGE_VAR_TECHNITIUM_KEY}}"
          range: LastDay

    - Traefik:
        icon: traefik
        href: https://traefik.infra.sintaq.net
        description: Edge Router & Reverse Proxy
        siteMonitor: https://traefik.infra.sintaq.net
        widget:
          type: traefik
          url: https://traefik.infra.sintaq.net
          username: "{{HOMEPAGE_VAR_TRAEFIK_USERNAME}}"
          password: "{{HOMEPAGE_VAR_TRAEFIK_PASSWORD}}"

- App Services:
    - File Browser:
        icon: filebrowser
        href: https://filebrowser.infra.sintaq.net
        description: Document Management
        siteMonitor: https://filebrowser.infra.sintaq.net
        proxmoxNode: pve
        proxmoxVMID: 206

    - Immich:
        icon: immich
        href: https://immich.infra.sintaq.net
        description: Photos & Videos Backup
        siteMonitor: https://immich.infra.sintaq.net
        widget:
          type: immich
          url: https://immich.infra.sintaq.net
          key: "{{HOMEPAGE_VAR_IMMICH_KEY}}"
          version: 2

    - Vaultwarden:
        icon: vaultwarden
        href: https://vaultwarden.infra.sintaq.net
        description: Password Manager
        siteMonitor: https://vaultwarden.infra.sintaq.net
        proxmoxNode: pve
        proxmoxVMID: 205

- Monitoring:
    - Dozzle:
        icon: dozzle
        href: https://dozzle.infra.sintaq.net
        description: Docker Logs Viewer
        siteMonitor: https://dozzle.infra.sintaq.net
        proxmoxNode: pve
        proxmoxVMID: 203
