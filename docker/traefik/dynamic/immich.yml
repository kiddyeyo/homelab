http:
  routers:
    immich-rtr:
      rule: "Host(`immich.infra.sintaq.net`)"
      entryPoints: ["websecure"]
      service: immich-svc
      # middlewares: ["secure-headers"] # Comentado según original
      tls:
        certResolver: cloudflare

  services:
    immich-svc:
      loadBalancer:
        servers:
          - url: "http://192.168.100.28:2283"
