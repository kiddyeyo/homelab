http:
  routers:
    rustfs-api-rtr:
      rule: "Host(`s3.infra.sintaq.net`)"
      entryPoints: ["websecure"]
      service: rustfs-api-svc
      tls:
        certResolver: cloudflare
      middlewares: ["secure-headers"]

  services:
    rustfs-api-svc:
      loadBalancer:
        servers:
          - url: "http://10.24.10.7:9000"
