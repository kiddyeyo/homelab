services:
  vaultwarden:
    image: vaultwarden/server:1.36.0
    container_name: vaultwarden
    restart: unless-stopped
    environment:
      ADMIN_TOKEN: ${admin_token}
      DOMAIN: https://vaultwarden.infra.sintaq.net
    volumes:
      - ./vaultwarden_data:/data
    ports:
      - "80:80"

  dozzle-agent:
    image: amir20/dozzle:v10.6.11
    container_name: dozzle_agent_vw
    restart: unless-stopped
    command: agent
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    ports:
      - 7007:7007
    environment:
      DOZZLE_HOSTNAME: vaultwarden
