---
- name: "Crear directorios del stack de vaultwarden"
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0755"
  loop:
    - "{{ stack_base_path }}/vaultwarden"
    - "{{ stack_base_path }}/vaultwarden/vaultwarden_data"

- name: "Copiar docker-compose de vaultwarden"
  ansible.builtin.copy:
    src: "{{ compose_files_path }}/vaultwarden/docker-compose.yml"
    dest: "{{ stack_base_path }}/vaultwarden/docker-compose.yml"
    mode: "0644"
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
  notify: "Recrear stack de vaultwarden"

- name: "Descifrar archivo .env de vaultwarden"
  ansible.builtin.command: "sops -d {{ compose_files_path }}/vaultwarden/.env"
  delegate_to: localhost
  become: false
  register: deploy_vaultwarden_env
  changed_when: false
  no_log: true

- name: "Escribir archivo .env descifrado"
  ansible.builtin.copy:
    content: "{{ deploy_vaultwarden_env.stdout }}"
    dest: "{{ stack_base_path }}/vaultwarden/.env"
    mode: "0600"
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
  no_log: true
  notify: "Recrear stack de vaultwarden"
