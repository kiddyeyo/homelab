---
- name: "Crear directorios del stack de twingate"
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0755"
  loop:
    - "{{ stack_base_path }}/twingate"

- name: "Copiar docker-compose de twingate"
  ansible.builtin.copy:
    src: "{{ compose_files_path }}/twingate/docker-compose.yml"
    dest: "{{ stack_base_path }}/twingate/docker-compose.yml"
    mode: "0644"
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
  notify: "Recrear stack de twingate"

- name: "Descifrar archivo .env de twingate"
  ansible.builtin.command: "sops -d {{ compose_files_path }}/twingate/.env"
  delegate_to: localhost
  become: false
  register: deploy_twingate_env
  changed_when: false
  no_log: true

- name: "Escribir archivo .env descifrado"
  ansible.builtin.copy:
    content: "{{ deploy_twingate_env.stdout }}"
    dest: "{{ stack_base_path }}/twingate/.env"
    mode: "0600"
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
  no_log: true
  notify: "Recrear stack de twingate"
