---
- name: "Crear directorios del stack de immich"
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0755"
  loop:
    - "{{ stack_base_path }}/immich"
    - "{{ stack_base_path }}/immich/data"
    - "{{ stack_base_path }}/immich/postgres"

- name: "Copiar docker-compose de immich"
  ansible.builtin.copy:
    src: "{{ compose_files_path }}/immich/docker-compose.yml"
    dest: "{{ stack_base_path }}/immich/docker-compose.yml"
    mode: "0644"
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
  notify: "Recrear stack de immich"

- name: "Descifrar archivo .env de immich"
  ansible.builtin.command: "sops -d {{ compose_files_path }}/immich/.env"
  delegate_to: localhost
  become: false
  register: deploy_immich_env
  changed_when: false
  no_log: true

- name: "Escribir archivo .env descifrado"
  ansible.builtin.copy:
    content: "{{ deploy_immich_env.stdout }}"
    dest: "{{ stack_base_path }}/immich/.env"
    mode: "0600"
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
  no_log: true
  notify: "Recrear stack de immich"
