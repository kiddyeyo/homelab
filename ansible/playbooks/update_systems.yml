---
- name: "Actualizacion de contenedores LXC"
  hosts: lxcs
  become: true
  # serial: 1
  tasks:
    - name: "Actualizar cache de paquetes y realizar upgrade"
      ansible.builtin.apt:
        update_cache: true
        upgrade: dist
        autoremove: true
        autoclean: true

    - name: "Verificar si se requiere reinicio"
      ansible.builtin.stat:
        path: /var/run/reboot-required
      register: reboot_required_file

    - name: "Reiniciar el LXC si es necesario"
      ansible.builtin.reboot:
        msg: "Reinicio solicitado por Ansible tras actualización de seguridad"
        reboot_timeout: 300
      when: reboot_required_file.stat.exists

- name: "Actualizacion del host Proxmox"
  hosts: proxmox_host
  become: true
  tasks:
    - name: "Actualizar el sistema Proxmox"
      ansible.builtin.apt:
        update_cache: true
        upgrade: dist
        autoclean: true

    - name: "Verificar si el host Proxmox requiere reinicio"
      ansible.builtin.stat:
        path: /var/run/reboot-required
      register: pve_reboot_required

    - name: "Reiniciar host Proxmox"
      ansible.builtin.reboot:
        msg: "Reinicio de Host Proxmox iniciado por Ansible"
        reboot_timeout: 600
      when: pve_reboot_required.stat.exists
