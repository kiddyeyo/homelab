---
- name: Actualización de Contenedores LXC (Mantenimiento Serializado)
  hosts: lxcs
  become: true
  # serial: 1
  tasks:
    - name: Actualizar caché de paquetes y realizar upgrade
      ansible.builtin.apt:
        update_cache: true
        upgrade: dist
        autoremove: true
        autoclean: true

    - name: Verificar si se requiere reinicio
      ansible.builtin.stat:
        path: /var/run/reboot-required
      register: reboot_required_file

    - name: Reiniciar el LXC si es necesario
      ansible.builtin.reboot:
        msg: "Reinicio solicitado por Ansible tras actualización de seguridad"
        reboot_timeout: 300
      when: reboot_required_file.stat.exists

- name: Actualización del Host Proxmox
  hosts: proxmox_host
  become: true
  tasks:
    - name: Actualizar el sistema Proxmox
      ansible.builtin.apt:
        update_cache: true
        upgrade: dist
        autoclean: true

    - name: Verificar si el Host Proxmox requiere reinicio
      ansible.builtin.stat:
        path: /var/run/reboot-required
      register: pve_reboot_required

    - name: Reiniciar Host Proxmox (¡CUIDADO!)
      ansible.builtin.reboot:
        msg: "Reinicio de Host Proxmox iniciado por Ansible"
        reboot_timeout: 600
      when: pve_reboot_required.stat.exists
