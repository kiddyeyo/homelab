---
- name: "Despliegue de Traefik"
  hosts: traefik
  become: true
  vars_files:
    - ../../vars/secrets.yml
  tags: ["traefik"]
  tasks:
    - name: "Crear directorios de configuracion"
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        owner: "{{ user }}"
        group: "{{ user }}"
        mode: "0755"
      loop:
        - "/home/erickcastillo/homelab/traefik"
        - "/home/erickcastillo/homelab/traefik/dynamic"

    - name: "Copiar configuracion estatica"
      ansible.builtin.copy:
        src: "{{ compose_files_path }}/traefik/traefik.yml"
        dest: "/home/erickcastillo/homelab/traefik/traefik.yml"
        mode: "0644"
        owner: "{{ user }}"
        group: "{{ user }}"

    - name: "Copiar configuracion dinamica"
      ansible.builtin.copy:
        src: "{{ compose_files_path }}/traefik/dynamic/"
        dest: "/home/erickcastillo/homelab/traefik/dynamic/"
        mode: "0644"
        owner: "{{ user }}"
        group: "{{ user }}"

    - name: "Copiar docker-compose"
      ansible.builtin.copy:
        src: "{{ compose_files_path }}/traefik/docker-compose.yml"
        dest: "/home/erickcastillo/homelab/traefik/docker-compose.yml"
        mode: "0644"
        owner: "{{ user }}"
        group: "{{ user }}"

    - name: "Descifrar archivo .env"
      ansible.builtin.command: "sops -d {{ compose_files_path }}/traefik/.env"
      delegate_to: localhost
      become: false
      register: traefik_env
      changed_when: false

    - name: "Escribir archivo .env descifrado"
      ansible.builtin.copy:
        content: "{{ traefik_env.stdout }}"
        dest: "/home/erickcastillo/homelab/traefik/.env"
        mode: "0600"
        owner: "{{ user }}"
        group: "{{ user }}"

    - name: "Levantar contenedor"
      ansible.builtin.command: "docker compose up -d --force-recreate --remove-orphans"
      args:
        chdir: "/home/erickcastillo/homelab/traefik"
      changed_when: true
