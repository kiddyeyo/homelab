---
- name: "Despliegue de Homepage"
  hosts: homepage
  become: true
  vars_files:
    - ../../vars/secrets.yml
  tags: ["homepage"]
  tasks:
    - name: "Crear directorio del servicio"
      ansible.builtin.file:
        path: "/home/erickcastillo/homelab/homepage"
        state: directory
        owner: "{{ user }}"
        group: "{{ user }}"
        mode: "0755"

    - name: "Copiar configuracion"
      ansible.builtin.copy:
        src: "{{ compose_files_path }}/homepage/{{ item }}"
        dest: "/home/erickcastillo/homelab/homepage/"
        mode: "0644"
        owner: "{{ user }}"
        group: "{{ user }}"
      loop:
        - "bookmarks.yaml"
        - "docker.yaml"
        - "services.yaml"
        - "settings.yaml"
        - "widgets.yaml"

    - name: "Copiar docker-compose"
      ansible.builtin.copy:
        src: "{{ compose_files_path }}/homepage/docker-compose.yml"
        dest: "/home/erickcastillo/homelab/homepage/docker-compose.yml"
        mode: "0644"
        owner: "{{ user }}"
        group: "{{ user }}"

    - name: "Descifrar archivo .env"
      ansible.builtin.command: "sops -d {{ compose_files_path }}/homepage/.env"
      delegate_to: localhost
      become: false
      register: homepage_env
      changed_when: false

    - name: "Escribir archivo .env descifrado"
      ansible.builtin.copy:
        content: "{{ homepage_env.stdout }}"
        dest: "/home/erickcastillo/homelab/homepage/.env"
        mode: "0600"
        owner: "{{ user }}"
        group: "{{ user }}"

    - name: "Levantar contenedor"
      ansible.builtin.command: "docker compose up -d --force-recreate --remove-orphans"
      args:
        chdir: "/home/erickcastillo/homelab/homepage"
      changed_when: true
