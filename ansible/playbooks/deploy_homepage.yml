---

- name: "Despliegue de Homepage"
  hosts: homepage
  become: true
  tags: ['homepage']

  tasks:
    - name: "Homepage | Crear directorio del servicio"
      ansible.builtin.file:
        path: "/home/erickcastillo/homelab/homepage"
        state: directory
        owner: erickcastillo
        group: erickcastillo
        mode: '0755'

    - name: "Homepage | Copiar YAMLs de configuracion"
      ansible.builtin.copy:
        src: "../../homepage/{{ item }}"
        dest: "/home/erickcastillo/homelab/homepage/"
        mode: '0644'
        owner: erickcastillo
        group: erickcastillo
      loop:
        - "bookmarks.yaml"
        - "docker.yaml"
        - "services.yaml"
        - "settings.yaml"
        - "widgets.yaml"

    - name: "Homepage | Copiar docker-compose"
      ansible.builtin.copy:
        src: "../../homepage/docker-compose.yml"
        dest: "/home/erickcastillo/homelab/homepage/docker-compose.yml"
        mode: '0644'
        owner: erickcastillo
        group: erickcastillo

    - name: "Homepage | Descifrar .env (Local)"
      ansible.builtin.command: "sops -d ../../homepage/.env"
      delegate_to: localhost
      become: false
      register: homepage_env
      changed_when: false

    - name: "Homepage | Escribir .env descifrado"
      ansible.builtin.copy:
        content: "{{ homepage_env.stdout }}"
        dest: "/home/erickcastillo/homelab/homepage/.env"
        mode: '0600'
        owner: erickcastillo
        group: erickcastillo

    - name: "Homepage | Levantar contenedor"
      ansible.builtin.command: "docker compose up -d --force-recreate --remove-orphans"
      args:
        chdir: "/home/erickcastillo/homelab/homepage"
      changed_when: true
