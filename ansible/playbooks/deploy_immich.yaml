---

- name: "Despliegue de Immich"
  hosts: Immich
  become: true
  tags: ['Immich']

  tasks:
    - name: "Immich | Copiar YAMLs de configuracion"
      ansible.builtin.copy:
        src: "../../immich/config/"
        dest: "/home/erickcastillo/homelab/immich/config/"
        mode: '0644' # <--- Aquí está el permiso de archivo
        owner: erickcastillo
        group: erickcastillo

    - name: "Immich | Copiar docker-compose"
      ansible.builtin.copy:
        src: "../../immich/docker-compose.yml"
        dest: "/home/erickcastillo/homelab/immich/docker-compose.yml"
        mode: '0644'
        owner: erickcastillo
        group: erickcastillo

    - name: "Immich | Descifrar .env (Local)"
      ansible.builtin.command: "sops -d ../../immich/.env" # <--- Cambiado a command
      delegate_to: localhost
      become: false
      register: immich_env
      changed_when: false

    - name: "Immich | Escribir .env descifrado"
      ansible.builtin.copy:
        content: "{{ immich_env.stdout }}"
        dest: "/home/erickcastillo/homelab/immich/.env"
        mode: '0600' # <--- Seguridad industrial: solo dueño lee/escribe
        owner: erickcastillo
        group: erickcastillo

    - name: "Immich | Levantar contenedor"
      ansible.builtin.command: "docker compose up -d --force-recreate" # <--- Cambiado a command
      args:
        chdir: "/home/erickcastillo/homelab/immich"
      changed_when: true # <--- Le dice a Ansible que este comando siempre hace un cambio
